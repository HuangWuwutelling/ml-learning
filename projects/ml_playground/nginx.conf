# Nginx reverse proxy for ML Playground
# Mounted into the nginx container at /etc/nginx/conf.d/default.conf

# ── Upstream: FastAPI service in the compose network ─────────
upstream ml_playground_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Larger buffers for prediction payloads (lists of features)
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 64k;

    # ── Gradio UI (root path) ─────────────────────────────────
    location / {
        proxy_pass http://ml_playground_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support — Gradio uses websockets for live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── REST API ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://ml_playground_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── FastAPI auto-docs (Swagger UI + ReDoc + OpenAPI) ──────
    location ~ ^/(docs|redoc|openapi.json)$ {
        proxy_pass http://ml_playground_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check (for monitoring) ─────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}