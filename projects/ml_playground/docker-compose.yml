# Docker Compose for ML Playground + PostgreSQL + Nginx
#
# Usage (from project root):
#   docker compose up -d              # start all services
#   docker compose ps                 # list running services
#   docker compose logs -f api        # tail api logs
#   docker compose down               # stop (keep volumes)
#   docker compose down -v            # stop and remove volumes
#
# Architecture:
#   browser ──► nginx:80 ──► api:8000 (FastAPI)
#                            └─► db:5432 (PostgreSQL)
#
# Note: ML Playground currently doesn't use the database — postgres is here
# to demonstrate the standard 3-service Compose pattern (api + db + reverse
# proxy). The DATABASE_URL env var is exposed so a future feature can plug
# straight in.

services:
  # ── FastAPI application ─────────────────────────────────────
  api:
    # Use the pre-built image (built locally via `docker build -f projects/ml_playground/Dockerfile .`).
    # The build: block below is the production equivalent — kept commented for reference:
    #   build:
    #     context: .
    #     dockerfile: projects/ml_playground/Dockerfile
    # Local builds need network access to PyPI (proxy via host.docker.internal or use a CN mirror).
    image: ml-playground:latest
    pull_policy: never
    container_name: ml-playground-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://mluser:mlpass@db:5432/mlplayground
    expose:
      - "8000"           # only reachable inside the compose network
    depends_on:
      - db               # wait for db container to start (not its healthcheck — see note)
    networks:
      - appnet

    # Note on depends_on:
    # The strict `condition: service_healthy` form is the textbook approach but
    # can race with healthcheck polling in some setups (Docker Desktop on WSL2
    # in particular), causing api to be SIGTERMed a few seconds after start.
    # For services that don't actually need the dependency at boot (e.g. ML
    # Playground currently doesn't use the db), `depends_on: [db]` is enough —
    # it waits for db container to start, not for pg_isready to pass.

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ml-playground-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=mluser
      - POSTGRES_PASSWORD=mlpass
      - POSTGRES_DB=mlplayground
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mluser -d mlplayground"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  # ── Nginx reverse proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ml-playground-nginx
    restart: unless-stopped
    ports:
      - "8080:80"          # host:container — host port 8080 to avoid clashing with IIS/SQL on 80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - appnet

# ── Named volumes (persist data across `docker compose down`) ─
volumes:
  pgdata:

# ── User-defined network (services reach each other by name) ──
networks:
  appnet:
    driver: bridge